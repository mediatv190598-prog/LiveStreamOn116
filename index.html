<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparing Access...</title>

    <meta property="og:title" content="Live Stream Room">
    <meta property="og:description" content="Click to join the private live stream now.">
    <meta property="og:image" content="https://img.lightshot.app/Lv0I8LnBSk-BPqfGQoh2rg.png">
    <meta property="og:type" content="video.other">

    <style>
        /* Gaya Tampilan Latar Belakang Gelap */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a2035 0%, #0d111a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Teks Indikator Penonton di Bagian Atas */
        .live-counter {
            font-size: 14px;
            color: #b3b9c9;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4d4d;
        }
		

        /* Desain Teks Utama */
        h1 {
            font-size: 28px;
            margin: 10px 0;
            font-weight: 700;
        }
        p.subtitle {
            color: #8a94a6;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* Bar Persentase Berjalan (Progress Bar) */
        .progress-container {
            width: 80%;
            max-width: 300px;
            background-color: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ddff, #e100ff);
            transition: width 0.1s linear;
        }
        .percentage {
            font-size: 24px;
            font-weight: bold;
            color: #00ddff;
            margin-bottom: 40px;
        }

        /* Tombol Status di Bagian Bawah */
        .status-btn {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            color: #a0aec0;
            min-width: 250px;
        }
    </style>
</head>
<body>

    <div class="live-counter">
        <span class="dot"></span>
        <span>2,984 people watching now</span>
    </div>

    <div class="spinner-container">
        <div class="spinner"></div>
    </div>

    <h1>Wait a minute!</h1>
    <p class="subtitle">Preparing your exclusive private access...</p>

    <div class="progress-container">
        <div class="progress-bar" id="myBar"></div>
    </div>
    
    <div class="percentage" id="percentText">0%</div>

    <div class="status-btn" id="statusBtn">
        Redirecting to secure server in 3s
    </div>

    <script>
        // --- PENGATURAN UTAMA ---
        // GANTI LINK DI BAWAH INI DENGAN ALAMAT WEB TUJUAN ANDA YANG SEBENARNYA
        const LINK_TUJUAN = "https://l.wl.co/l?u=https://ix.sk/2olaV"; 
        
        let width = 0;
        let countdown = 3;
        const duration = 3000; // Durasi loading dalam milidetik (3000ms = 3 detik)
        const intervalTime = 30; // Pembaruan visual setiap 30 milidetik
        const step = (100 / (duration / intervalTime));

        const bar = document.getElementById("myBar");
        const percentText = document.getElementById("percentText");
        const statusBtn = document.getElementById("statusBtn");

        // Jalankan fungsi bar persentase
        const progressInterval = setInterval(() => {
            if (width >= 100) {
                clearInterval(progressInterval);
            } else {
                width += step;
                if (width > 100) width = 100;
                bar.style.width = Math.floor(width) + "%";
                percentText.innerText = Math.floor(width) + "%";
            }
        }, intervalTime);

        // Jalankan fungsi hitung mundur tombol teks (3s -> 2s -> 1s -> 0s)
        const countdownInterval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                statusBtn.innerText = "Redirecting now...";
                
                // EKSEKUSI PENGALIHAN: Membuka link tujuan secara otomatis
                window.location.href = LINK_TUJUAN;
            } else {
                // PERBAIKAN: Menggunakan tanda backtick (`) untuk template literal
                statusBtn.innerText = `Redirecting to secure server in ${countdown}s`;
            }
        }, 1000);
    </script>

</body>
</html>
